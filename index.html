    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        window.convertPdfStreamToImages = async (streamRef) => {
            // 1. Process byte arrays stream securely out of Blazor directly into JS memory allocation
            const streamBuffer = await streamRef.arrayBuffer();

            // 2. Load data array pointer directly into Mozilla's processing pipeline
            const loadingTask = pdfjsLib.getDocument({ data: streamBuffer });
            const pdf = await loadingTask.promise;
            const pageImageUrls = [];

            // 3. Loop and render every page onto canvas arrays
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);

                // Render at high scaling visibility (scale: 2) for crisp rendering on high-DPI displays
                const viewport = page.getViewport({ scale: 2.0 });

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };

                await page.render(renderContext).promise;

                // Export out clean web-safe compression jpegs
                pageImageUrls.push(canvas.toDataURL('image/jpeg', 0.85));

                // Memory cleanup
                canvas.width = 0;
                canvas.height = 0;
            }

            return pageImageUrls;
        };
    </script>
